<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIT Repository | Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        #popup {
            display: none; 
            position: fixed; 
            top: 20px; 
            right: 20px;
            padding: 12px 24px; 
            font-weight: 700; 
            border-radius: 8px;
            z-index: 2000; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            background-color: #ffffff;
            min-width: 250px;
        }
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 20px;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            z-index: 5;
        }
        .password-container { position: relative; margin-bottom: 1rem; }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>
<header class="top-bar">
    <div class="branding">
        <a href="dashboard.html"><img src="../assets/images/logo.png" alt="SIT Logo"></a>
        <span>SETHU INSTITUTE OF TECHNOLOGY</span>
    </div>
    <div id="popup"></div>
</header>

<div class="watermark"></div>

<main class="login-page">
    <div class="login-box">
        <h5 class="login-title text-center mb-4">CHANGE PASSWORD</h5>
        
        <form id="passwordForm">
            <div class="password-container">
                <input type="password" id="currPass" class="form-control" placeholder="Enter Current Password" required>
                <span class="toggle-password" onclick="togglePass('currPass', this)">👁️</span>
            </div>
            <div class="password-container">
                <input type="password" id="newPass" class="form-control" placeholder="Enter New Password" required>
                <span class="toggle-password" onclick="togglePass('newPass', this)">👁️</span>
            </div>
            <div class="password-container" style="margin-bottom: 1.5rem;">
                <input type="password" id="confirmPass" class="form-control" placeholder="Re-enter New Password" required>
                <span class="toggle-password" onclick="togglePass('confirmPass', this)">👁️</span>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">SUBMIT</button>
        </form>

        <div class="text-center">
            <a href="profile.html" class="small text-decoration-none text-muted">← Back to Profile</a>
        </div>
    </div>
</main>

<script>
function showNotification(message, type = "success") {
    const popup = document.getElementById('popup');
    popup.innerText = message;
    popup.style.display = "block";
    if (type === "success") {
        popup.style.color = "#008000";
        popup.style.borderLeft = "6px solid #008000";
    } else {
        popup.style.color = "#d9534f";
        popup.style.borderLeft = "6px solid #d9534f";
    }
    setTimeout(() => { popup.style.display = "none"; }, 3000);
}

function togglePass(id, icon) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        icon.textContent = "🙈";
    } else {
        input.type = "password";
        icon.textContent = "👁️";
    }
}

window.onload = function() {
    if (!localStorage.getItem('facultyID')) {
        window.location.href = "index.html";
    }
};

document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    let faculty_id = localStorage.getItem('facultyID');
    const current_password = document.getElementById('currPass').value;
    const new_password = document.getElementById('newPass').value;
    const confirm_password = document.getElementById('confirmPass').value;

    if (new_password !== confirm_password) {
        showNotification("the password is mismatch", "error");
        return;
    }

    try {
        const response = await fetch('http://127.0.0.1:5000/auth/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                faculty_id: faculty_id, 
                current_password: current_password, 
                new_password: new_password,
                confirm_password: confirm_password // FIXED: Sending this so Backend can see it
            })
        });
        const result = await response.json();
        if (response.ok) {
            showNotification("Password changed successfully", "success");
            setTimeout(() => window.location.href = "profile.html", 2000);
        } else {
            showNotification(result.message || "Change failed", "error");
        }
    } catch (err) {
        showNotification("Server Error - Is your backend running?", "error");
    }
});
</script>
</body>
</html>
