<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIT Repository | Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .password-container { position: relative; margin-bottom: 0.5rem; }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="branding">
        <a href="index.html"><img src="../assets/images/logo.png" alt="SIT Logo"></a>
        <span style="color: #0d6efd; font-weight: bold;">SETHU INSTITUTE OF TECHNOLOGY</span>
    </div>
    <div id="popup"></div>
</header>

<main class="auth-wrapper">
    <div class="watermark"></div>

    <div class="login-box" style="max-width: 450px;">
        <h5 class="login-title text-center mb-4" style="color: #0d6efd; font-weight: bold;">Create New Account</h5>
        
        <form id="registerForm">
            <div class="text-center mb-3">
                <label for="profileInput" style="cursor: pointer;">
                    <div class="profile-pic-display" style="width: 80px; height: 80px; border: 2px dashed #0d6efd; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0 auto; background-color: #f8f9fa;">
                        <img id="previewImg" src="" style="display:none; width:100%; height:100%; object-fit:cover;">
                        <span id="uploadPlaceholder" style="font-size: 10px; color: #0d6efd;">Upload Pic</span>
                    </div>
                </label>
                <input type="file" id="profileInput" accept="image/*" style="display: none;">
            </div>

            <input type="text" id="name" class="form-control mb-2" placeholder="Full Name" required>
            <input type="text" id="facultyId" class="form-control mb-2" placeholder="Faculty ID" required>
            <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
            
            <div class="password-container">
                <input type="password" id="password" class="form-control" placeholder="Enter Password" required>
                <span class="toggle-password" onclick="togglePass('password', this)">👁️</span>
            </div>
            
            <div class="password-container">
                <input type="password" id="repassword" class="form-control" placeholder="Re-enter Password" required>
                <span class="toggle-password" onclick="togglePass('repassword', this)">👁️</span>
            </div>

            <select id="position" class="form-select mb-2" required>
                <option selected disabled value="">Select Position</option>
                <option value="Principal">Principal</option>
                <option value="Dean">Dean</option>
                <option value="Head of the Department">Head of the Department</option>
                <option value="Professor">Professor</option>
                <option value="Associate Professor">Associate Professor</option>
                <option value="Assistant Professor">Assistant Professor</option>
            </select>
            
            <select id="department" class="form-select mb-3" required>
                <option selected disabled value="">Select Department</option>
                <option>Mechanical Engg.</option>
                <option>Computer Science & Engg.</option>
                <option>Electronics & Communication Engg.</option>
                <option>Electrical & Electronics Engg.</option>
                <option>Information Technology</option>
                <option>Civil Engineering</option>
                <option>Chemical Engineering</option>
                <option>Agricultural Engineering</option>
                <option>Biomedical Engineering</option>
                <option>Bio Technology</option>
                <option>Computer Science and Business Systems</option>
                <option>Computer Science and Design</option>
                <option>Artificial Intelligence and Data Science</option>
                <option>Computer Science and Engineering(AI & ML)</option>
                <option>B.E. Computer Science and Engineering (Cyber Security)</option>
                <option>B.E. Computer Science and Engineering (IoT)</option>
                <option>Physics</option>
                <option>Chemistry</option>
                <option>Mathematics</option>
                <option>English</option>
            </select>

            <button type="submit" class="btn btn-primary w-100 mb-2">CREATE ACCOUNT</button>
        </form>

        <div class="text-center">
            <a href="index.html" class="small text-decoration-none">Already have an account? Login</a>
        </div>
    </div>
</main>

<script>
    function showNotification(message, type = "success") {
        const popup = document.getElementById('popup');
        popup.innerText = message;
        popup.style.display = "block";
        if (type === "success") {
            popup.style.color = "#008000";
            popup.style.borderLeft = "6px solid #008000";
        } else {
            popup.style.color = "#d9534f";
            popup.style.borderLeft = "6px solid #d9534f";
        }
        setTimeout(() => { popup.style.display = "none"; }, 3000);
    }

    function togglePass(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.textContent = "🙈";
        } else {
            input.type = "password";
            icon.textContent = "👁️";
        }
    }

    document.getElementById('profileInput').onchange = evt => {
        const [file] = document.getElementById('profileInput').files;
        if (file) {
            document.getElementById('previewImg').src = URL.createObjectURL(file);
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('uploadPlaceholder').style.display = 'none';
        }
    }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
