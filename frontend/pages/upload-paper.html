<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIT Repository | Upload Paper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Unified Notification Design */
        #popup {
            display: none; 
            position: fixed; 
            top: 20px; 
            right: 20px;
            padding: 10px 20px; 
            font-weight: 700; 
            border-radius: 8px;
            z-index: 2000; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            background-color: #ffffff;
        }

        /* Non-scrollable layout fix */
        body {
            overflow: hidden; /* Prevents body scroll */
            background-color: #f8f9fa;
        }

        .upload-page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px); /* Fits exactly below header */
            padding: 10px;
        }

        .upload-box {
            width: 100%;
            max-width: 650px; 
            background: #ffffff;
            padding: 25px 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .form-label-custom {
            font-size: 0.75rem;
            font-weight: 700;
            color: #666;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
        }

        .form-control, .form-select {
            padding: 10px;
            font-size: 0.95rem;
            border-radius: 6px;
        }

        .btn-upload {
            padding: 12px;
            font-weight: 700;
            background-color: #0d6efd;
            border: none;
            margin-top: 10px;
        }

        .mb-custom { margin-bottom: 12px; }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="branding">
        <a href="dashboard.html"><img src="../assets/images/logo.png" alt="SIT Logo"></a>
        <span class="ms-2 fw-bold" style="color: #0d6efd;">SETHU INSTITUTE OF TECHNOLOGY</span>
    </div>
    <div id="popup"></div>
</header>

<div class="watermark"></div>

<main class="upload-page">
    <div class="upload-box">
        <div class="text-center mb-3">
            <h5 class="fw-bold m-0" style="color: #333;">Upload Research Paper</h5>
        </div>
        
        <form id="uploadForm">
            <div class="mb-custom">
                <label class="form-label-custom">Paper Title</label>
                <input type="text" id="paperTitle" class="form-control" placeholder="Enter title" required>
            </div>
            
            <div class="mb-custom">
                <label class="form-label-custom">Journal / Conference</label>
                <input type="text" id="journalName" class="form-control" placeholder="Enter journal name" required>
            </div>

            <div class="row g-2 mb-custom">
                <div class="col-6">
                    <label class="form-label-custom">Domain</label>
                    <input type="text" id="paperDomain" class="form-control" placeholder="e.g. Cloud" required>
                </div>
                <div class="col-6">
                    <label class="form-label-custom">Keywords</label>
                    <input type="text" id="paperKeywords" class="form-control" placeholder="AI / ML" required>
                </div>
            </div>

            <div class="row g-2 mb-custom">
                <div class="col-4">
                    <label class="form-label-custom">Year</label>
                    <input type="number" id="paperYear" class="form-control" placeholder="2026" required>
                </div>
                <div class="col-4">
                    <label class="form-label-custom">Volume</label>
                    <input type="text" id="volume" class="form-control" placeholder="Vol. 1">
                </div>
                <div class="col-4">
                    <label class="form-label-custom">Page No.</label>
                    <input type="text" id="pageNumber" class="form-control" placeholder="250">
                </div>
            </div>

            <div class="row g-2 mb-custom">
                <div class="col-6">
                    <label class="form-label-custom">Type</label>
                    <select id="pubType" class="form-select" required>
                        <option selected disabled value="">Choose...</option>
                        <option value="Journal">Journal</option>
                        <option value="Conference">Conference</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label-custom">PDF File</label>
                    <input type="file" id="paperFile" class="form-control" accept=".pdf" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-upload w-100">UPLOAD TO REPOSITORY</button>
        </form>

        <div class="text-center mt-3">
            <a href="profile.html" class="text-decoration-none text-muted small fw-bold">← Back to Profile</a>
        </div>
    </div>
</main>

<script>
function showNotification(message, type = "success") {
    const popup = document.getElementById('popup');
    popup.innerText = message;
    popup.style.display = "block";
    popup.style.color = type === "success" ? "#008000" : (type === "loading" ? "orange" : "#d9534f");
    popup.style.borderLeft = `6px solid ${popup.style.color}`;

    if (type !== "loading") {
        setTimeout(() => { popup.style.display = "none"; }, 2500);
    }
}

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const faculty_id = localStorage.getItem("facultyID");
    if (!faculty_id) {
        showNotification("Please login again.", "error");
        return;
    }

    const formData = new FormData();
    formData.append("faculty_id", faculty_id);
    formData.append("title", document.getElementById("paperTitle").value.trim());
    formData.append("journal_name", document.getElementById("journalName").value.trim());
    formData.append("domain", document.getElementById("paperDomain").value.trim());
    formData.append("keywords", document.getElementById("paperKeywords").value.trim());
    formData.append("year", document.getElementById("paperYear").value.trim());
    formData.append("volume", document.getElementById("volume").value.trim());
    formData.append("page_number", document.getElementById("pageNumber").value.trim());
    formData.append("pub_type", document.getElementById("pubType").value);
    formData.append("file", document.getElementById("paperFile").files[0]);

    showNotification("Uploading...", "loading");

    try {
        const response = await fetch('http://localhost:5000/auth/upload-paper', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            showNotification("Uploaded successfully!", "success");
            setTimeout(() => window.location.href = "profile.html", 1500);
        } else {
            const data = await response.json();
            showNotification(data.message || "Upload failed", "error");
        }
    } catch (err) {
        showNotification("Server error.", "error");
    }
});
</script>
</body>
</html>
