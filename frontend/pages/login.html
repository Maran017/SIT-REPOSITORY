<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIT Repository | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
            z-index: 10;
        }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="branding">
        <img src="../assets/images/logo.png" alt="SIT Logo">
        <span>SETHU INSTITUTE OF TECHNOLOGY</span>
    </div>
    <div id="popup"></div>
</header>

<main class="auth-wrapper">
    <div class="watermark"></div>
    
    <div class="login-box">
        <h5 class="login-title text-center mb-4">Repository Login</h5>
        
        <form id="loginForm">
            <input type="text" id="loginFacultyId" class="form-control mb-3" placeholder="Faculty ID" required>
            
            <div class="password-container mb-3">
                <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
                <span class="toggle-password" id="eyeIcon">👁️</span>
            </div>
            
            <button type="submit" id="loginBtn" class="btn btn-primary w-100 mb-3">Login</button>
        </form>

        <div class="login-links d-flex justify-content-between">
            <a href="register.html" class="small text-decoration-none">Create New Account</a>
            <a href="forgot-password.html" class="small text-decoration-none">Forgot Password?</a>
        </div>
        <div class="mt-3 text-center">
            <a href="index.html" class="text-decoration-none small text-muted">← Back to Home</a>
        </div>
    </div>
</main>

<script>
function showNotification(message, type = "success") {
    const popup = document.getElementById('popup');
    popup.innerText = message;
    popup.style.display = "block";
    
    if (type === "success") {
        popup.style.color = "#008000";
        popup.style.borderLeft = "6px solid #008000";
    } else {
        popup.style.color = "#d9534f"; 
        popup.style.borderLeft = "6px solid #d9534f";
    }

    setTimeout(() => { popup.style.display = "none"; }, 3000);
}

// Password Toggle Logic
document.getElementById('eyeIcon').addEventListener('click', function() {
    const passInput = document.getElementById('loginPassword');
    if (passInput.type === 'password') {
        passInput.type = 'text';
        this.textContent = '🙈';
    } else {
        passInput.type = 'password';
        this.textContent = '👁️';
    }
});

window.onload = function() {
    const deleteMsg = localStorage.getItem('deleteSuccessMsg');
    if (deleteMsg) {
        showNotification(deleteMsg, "success");
        localStorage.removeItem('deleteSuccessMsg');
    }
};
</script>

<script src="../assets/js/main.js"></script>
</body>
</html>
