<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIT Repository | Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Unified Notification Design */
        #popup {
            display: none; 
            position: fixed; 
            top: 20px; 
            right: 20px;
            padding: 12px 24px; 
            font-weight: 700; 
            border-radius: 8px;
            z-index: 2000; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            background-color: #ffffff;
            min-width: 250px;
        }

        /* Profile Card Styling */
        .profile-main-card {
            position: relative; /* Necessary for absolute positioning of badge */
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.75rem;
            padding: 5px 10px;
            border-radius: 50px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* Position & Department UI Styling */
        .edit-icon { 
            cursor: pointer; 
            color: #0d6efd; 
            margin-left: 8px; 
            font-size: 1.1rem;
            vertical-align: middle;
        }
        .edit-icon:hover { color: #0a58ca; }
        
        /* Unified hiding for both selection boxes */
        #positionSelect, #deptSelect { 
            display: none; 
            margin-top: 8px; 
            max-width: 280px; 
        }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="branding">
        <a href="dashboard.html" style="text-decoration:none">
            <img src="../assets/images/logo.png" alt="SIT Logo">
        </a>
        <span>SETHU INSTITUTE OF TECHNOLOGY</span>
    </div>
    <div id="popup"></div>
    <div class="ms-auto pe-3">
        <button onclick="logout()" class="btn btn-sm btn-outline-danger">LOGOUT</button>
    </div>
</header>

<div class="watermark"></div>

<main class="page-container">
    <div class="container" style="position: relative; z-index: 5;">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-4 shadow-sm mb-4 profile-main-card">
                    <span id="profileStatus" class="status-badge bg-danger text-white">INACTIVE</span>

                    <h5 class="mb-3">Author Name: <span class="text-primary" id="profileName">Loading...</span></h5>
                    
                    <p class="mb-2">
                        <b>Department:</b> <span id="profileDept">...</span>
                        <i class="bi bi-pencil-square edit-icon" id="editDeptBtn" title="Edit Department"></i>
                        <select id="deptSelect" class="form-select form-select-sm mt-2">
                            <option selected disabled value="">Select Department...</option>
                            <option>Mechanical Engg.</option>
                            <option>Computer Science & Engg.</option>
                            <option>Electronics & Communication Engg.</option>
                            <option>Electrical & Electronics Engg.</option>
                            <option>Information Technology</option>
                            <option>Civil Engineering</option>
                            <option>Chemical Engineering</option>
                            <option>Agricultural Engineering</option>
                            <option>Biomedical Engineering</option>
                            <option>Bio Technology</option>
                            <option>Computer Science and Business Systems</option>
                            <option>Computer Science and Design</option>
                            <option>Artificial Intelligence and Data Science</option>
                            <option>Computer Science and Engineering(AI & ML)</option>
                            <option>B.E. Computer Science and Engineering (Cyber Security)</option>
                            <option>B.E. Computer Science and Engineering (IoT)</option>
                            <option>Physics</option>
                            <option>Chemistry</option>
                            <option>Mathematics</option>
                            <option>English</option>
                        </select>
                    </p>
                    
                    <p class="mb-2">
                        <b>Position:</b> <span id="profilePosition" class="text-muted">...</span>
                        <i class="bi bi-pencil-square edit-icon" id="editPositionBtn" title="Edit Position"></i>
                        <select id="positionSelect" class="form-select form-select-sm mt-2">
                            <option selected disabled>Select Position...</option>
                            <option value="Principal">Principal</option>
                            <option value="Dean">Dean</option>
                            <option value="Head of the Department">Head of the Department</option>
                            <option value="Professor">Professor</option>
                            <option value="Associate Professor">Associate Professor</option>
                            <option value="Assistant Professor">Assistant Professor</option>
                        </select>
                    </p>

                    <p class="mb-3"><b>Faculty ID:</b> <span id="profileID">...</span> | <b>Email:</b> <span id="profileEmail">...</span></p>
                    <hr>
                    
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="mb-0 fw-bold">YOUR UPLOADS</h6>
                        <span class="badge bg-primary" id="paperCountBadge">0 Papers</span>
                    </div>
                    
                    <div id="personalUploadsList" style="max-height: 450px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; background: #fdfdfd;">
                        <div class="text-center p-4">
                            <div class="spinner-border spinner-border-sm text-primary"></div>
                            <p class="text-muted mt-2">Fetching your research papers...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 shadow-sm text-center">
                    <div class="profile-pic-display mx-auto mb-2">
                         <img id="userProfileImg" src="../assets/images/logo.png" class="rounded-circle" width="100" height="100" style="object-fit: cover; border: 2px solid #0d6efd;">
                    </div>
                    
                    <p class="mb-3"><a href="#" id="changePicBtn" class="text-decoration-none small text-primary fw-bold">Change Profile Picture</a></p>
                    <input type="file" id="changePicInput" hidden accept="image/*">

                    <div class="d-grid gap-2">
                        <button onclick="location.href='change-password.html'" class="btn btn-outline-primary btn-sm">Change Password</button>
                        <button onclick="location.href='upload-paper.html'" class="btn btn-primary btn-sm">Upload a Paper</button>
                    </div>
                    
                    <div class="mt-3">
                        <a href="dashboard.html" class="small text-decoration-none text-muted">← Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }
</script>
<script src="../assets/js/profile.js"></script> 
</body>
</html>
