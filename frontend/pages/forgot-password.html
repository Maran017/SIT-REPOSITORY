<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIT Repository | Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="top-bar">
    <div class="branding">
        <a href="index.html"><img src="../assets/images/logo.png" alt="SIT Logo"></a>
        <span>SETHU INSTITUTE OF TECHNOLOGY</span>
    </div>
    <div id="popup"></div>
</header>

<main class="auth-wrapper">
    <div class="watermark"></div>
    
    <div class="login-box">
        <h5 class="login-title text-center mb-3">Forgot Password</h5>
        <p class="text-muted text-center mb-4" style="font-size: 13px;">Enter your registered mail to receive a random password.</p>
        
        <form id="forgotForm" onsubmit="return false;">
            <input type="email" id="resetEmail" class="form-control mb-3" placeholder="Enter registered mail" required>
            <button id="sendBtn" class="btn btn-primary w-100 mb-3">SEND NEW PASSWORD</button>
        </form>

        <div class="text-center">
            <a href="index.html" class="small text-decoration-none">Go to login</a>
        </div>
    </div>
</main>

<script>
// Unified Notification Logic
function showNotification(message, type = "success") {
    const popup = document.getElementById('popup');
    popup.innerText = message;
    popup.style.display = "block";
    
    if (type === "success") {
        popup.style.color = "#008000";
        popup.style.borderLeft = "6px solid #008000";
    } else if (type === "warning") {
        popup.style.color = "#856404";
        popup.style.borderLeft = "6px solid #ffc107";
    } else {
        popup.style.color = "#d9534f";
        popup.style.borderLeft = "6px solid #d9534f";
    }

    if (type !== "warning") {
        setTimeout(() => { popup.style.display = "none"; }, 3000);
    }
}

async function handleReset() {
    const email = document.getElementById("resetEmail").value.trim();

    if (!email) {
        showNotification("Please enter your email", "error");
        return;
    }

    showNotification("Processing...", "warning");

    try {
        const response = await fetch('http://localhost:5000/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        });

        const data = await response.json();

        if (response.ok) {
            showNotification("New password sent to your email!", "success");
            setTimeout(() => { window.location.href = "index.html"; }, 3000);
        } else {
            showNotification(data.message || "Email not found", "error");
        }
    } catch (err) {
        showNotification("Server connection error", "error");
    }
}

document.getElementById("sendBtn").addEventListener("click", handleReset);

document.getElementById("resetEmail").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        e.preventDefault();
        handleReset();
    }
});
</script>

<script src="../assets/js/main.js"></script>
</body>
</html>
